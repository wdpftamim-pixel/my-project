<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <form>
            <div class="main">
                <h1 class="text-center">Password Validation</h1>
                <div class="row">
                    <label for="name" class="form-label col-sm-2 fw-bold">User Name:</label>
                    <div class="col-sm-10">
                        <input type="text" id="name" name="name" class="form-control"/>
                    </div>
                </div>
                 <div class="row mt-2">
                    <label for="password" class="form-label col-sm-2 fw-bold ">Password:</label>
                    <div class="col-sm-10 mb-2">
                        <input type="password" id="password" name="password" class="form-control"/> 
                    </div>
                </div>
                <div class="row">
                    <butto type="button" id="b1" class="btn btn-success form-control" onclick="abc()">Login</butto>
                </div>
            </div>
        </form>
        <div id="output"></div>
    </div>
    <script>
        function abc(){
            let name = document.getElementById("name").value;
            let password = document.getElementById("name").value;
            if(name == "admin" && password == "admin"){
                window.location.href = "dashboard.html";
            }
            else{
                 document.getElementById("output").innerHTML = "Invalid user name or password. Login Failed";
            }
        }
    </script>
</body> 
</html>
