<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            box-shadow: inset  2px 2px 5px 5px rgb(22, 177, 22);
            padding: 20px;
            border-radius: 10px;
        }
        #output{
            margin-top: 20px;
            padding: 10px;
            border: 2px solid hsl(78, 100%, 50%);
        }
    </style>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container mt-2">
        <form class="form-group">
            <div class="main">
                <h1 class="text-center"> <marquee>Looping Practice</marquee></h1>
                <div class="row">
                    <label for="num" class="form-label col-sm-2 fw-bold text-center">Input Your Number</label>
                    <div class="col-sm-10">
                        <input type="text" name="num" id="num" class="form-control"/>
                    </div>
                </div>
                <div class="offset-2 row">
                    <div>
                        <button class="btn btn-success mt-2" id="b1" name="b1" type="button" onclick="a.b1()"> Is Prime?</button>
                        <button class="btn btn-success mt-2" id="b2" name="b2" type="button" onclick="a.b2()">Factorial n!</button>
                        <button class="btn btn-success mt-2" id="b3" name="b3" type="button" onclick="a.b3()"> Sum of Series</button>
                        <button class="btn btn-success mt-2" id="b4" name="b4" type="button" onclick="a.b4()"> Double By Addition</button>
                        <button class="btn btn-success mt-2" id="b5" name="b5" type="button" onclick="a.b5()"> Check Email</button>
                        <button class="btn btn-success mt-2" id="b6" name="b6" type="button" onclick="a.b6()">Check Mobile</button>
                        <button class="btn btn-success mt-2" id="b7" name="b7" type="button" onclick="a.b7()">Check Website</button>
                    </div>
                </div>
            </div>
        </form>
        <div id="output"></div>
    </div>
    <script>
      class MyCLass{
        b1(){
            let n=document.getElementById("num").value;
            if(n<2){
                document.getElementById("output").innerHTML=" The Number is Not Prime";
                return;
            }
            else{
                for(let i=2;i<=n/2;i++){
                    let r=n%i;
                    if(r==0){
                        document.getElementById("output").innerHTML="The Number is Not Prime";
                        return;
                    }
                }
        }
         document.getElementById("output").innerHTML="The Number is Prime";
      }
      b2(){
        let n=document.getElementById("num").value;
        let fact=1;
        for(let i=1;i<=n;i++){
            fact*=i;
        }
         document.getElementById("output").innerHTML=`The Factorial is ${fact}.`;
      }
      b3(){
        let n=document.getElementById("num").value;
        let sum=0;
        for(let i=1;i<=n;i++){
            sum+=i;   
        }
        document.getElementById("output").innerHTML=`The Sum is ${sum}.`;
      }
      b4(){
         let n=document.getElementById("num").value;
         let sum=0;
         sum=Number(n)+Number(n);
          document.getElementById("output").innerHTML=`The Sum is ${sum}.`;
      }
      b5(){
         let n=document.getElementById("num").value;
         let p=/^([a-zA-Z0-9_-]+)(\@)([a-zA-Z0-9_-]+)(\.)([a-zA-Z0-9_-]){2,4}$/;
         if(!p.test(n))
            document.getElementById("output").innerHTML=`invalid email.Please enter an valid email`;
         else{
            document.getElementById("output").innerHTML=`Your email is valid `;
         }
      }
      b6(){
        let n=document.getElementById("num").value;
        let p=/^(\+88)?0?[0-9]{4}(-)?[0-9]{6}$/;
        if(!p.test(n))
            document.getElementById("output").innerHTML=`invalid Phone number.Please enter a valid Phone number`;
         else{
            document.getElementById("output").innerHTML=`Your Phone number is valid `;
         }
      }
      b7(){
        let n=document.getElementById("num").value;
        let p=/^(?:https?:\/\/)?(?:www\.)?([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/[^\s]*)?$/i;
        if(!p.test(n))
            document.getElementById("output").innerHTML=`you have enter an invalid webaddress.Please enter a valid webaddress`;
         else{
            document.getElementById("output").innerHTML=`You have enter a valid webaddress`;
         }
      }
    }
    let a= new MyCLass();
    </script>
</body>
</html>
