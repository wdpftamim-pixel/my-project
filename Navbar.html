<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Navbar Example</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .navbar-custom {
      background: #0b2f66; /* deep navy */
    }
    .navbar-custom .nav-link {
      color: #fff !important;
      margin-right: 15px;
      transition: 0.3s;
    }
    .navbar-custom .nav-link:hover {
      color: #ffd700 !important; /* gold hover */
    }
    .navbar-custom .btn-primary {
      background-color: #ffd700;
      border: none;
      color: #0b2f66;
      font-weight: 600;
    }
  </style>
</head>
<body>
  
  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
      <a class="navbar-brand text-white fw-bold" href="#">MyBrand</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon bg-light rounded"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">About</a>
            <ul class="navbar dropdown-menu">
                <li class="nav-dropdown"><a class="nav-link" href="#">Services</a></li>
                <li class="nav-dropdown"><a class="nav-link" href="#">Contact</a></li>
            </ul>
        </li>
          <li class="nav-item"><a class="nav-link" href="#">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>
        <button class="btn btn-primary ms-lg-3">Get Started</button>
      </div>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
