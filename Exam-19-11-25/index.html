<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        body {
            background: whitesmoke;
            min-height: 100vh;
            padding: 20px 0;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-header {
            background: linear-gradient(50deg, black,black, black);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            font-weight: bold;
            text-align: center;
        }
        .btn-primary {
            background: linear-gradient(45deg, black,black, black);
            border: none;
            border-radius: 25px;
            padding: 10px 30px;
            font-weight: bold;
        }
        .result-box {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            border-left: 4px solid #00ff00;
            display: none;
        }
        .container {
            max-width: 900px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-center mb-4">
            <h1 class="text-primary fw-bold mb-3">Action according to the case given in the question</h1>
        </div>

        <!-- Prime Number Checker -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">1. Prime Number Checker</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-8">
                        <input type="number" id="primeInput" class="form-control" placeholder="Enter a positive integer" min="2">
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-primary w-100" onclick="checkPrime()">Check Prime</button>
                    </div>
                </div>
                <div id="primeResult" class="result-box">
                </div>
            </div>
        </div>

        <!-- Grade Calculation -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">2. Student Grade Calculation</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-8">
                        <input type="number" id="gradeInput" class="form-control" placeholder="Enter percentage (0-100)" min="0" max="100" step="0.1">
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-primary w-100" onclick="calculateGrade()">Calculate Grade</button>
                    </div>
                </div>
                <div id="gradeResult" class="result-box">
                </div>
            </div>
        </div>

        <!-- Maximum Number Finder -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">3. Maximum Number Finder</h5>
            </div>
            <div class="card-body">
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <input type="number" id="num1" class="form-control" placeholder="Enter first number" step="any">
                    </div>
                    <div class="col-md-4">
                        <input type="number" id="num2" class="form-control" placeholder="Enter second number" step="any">
                    </div>
                    <div class="col-md-4">
                        <input type="number" id="num3" class="form-control" placeholder="Enter third number" step="any">
                    </div>
                </div>
                <button class="btn btn-primary w-100" onclick="findMaximum()">Find Maximum</button>
                <div id="maxResult" class="result-box">
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // Prime Number Checker
        function checkPrime() {
            let input = document.getElementById('primeInput').value;
            let number = parseInt(input);
            let resultDiv = document.getElementById('primeResult');

            // Input validation
            if (isNaN(number) || number < 2) {
                showResult(resultDiv, `"${input}" is not valid. Please enter an integer greater than 1.`, 'danger');
                return;
            }

            // Prime number logic
            let isPrime = true;
            if (number === 2) {
                isPrime = true;
            } else {
                for (let i = 2; i <= Math.sqrt(number); i++) {
                    if (number % i === 0) {
                        isPrime = false;
                        break;
                    }
                }
            }

            // Display result
            if (isPrime) {
                showResult(resultDiv, `<strong>${number} is a Prime Number</strong>`, 'success');
            } else {
                showResult(resultDiv, `<strong>${number} is not a Prime Number</strong>`, 'warning');
            }
        }

        //  Grade Calculator
        function calculateGrade() {
            // Get input value and convert to float
            let input = document.getElementById('gradeInput').value;
            let percentage = parseFloat(input);
            let resultDiv = document.getElementById('gradeResult');

            // Input validation
            if (isNaN(percentage) || percentage < 0 || percentage > 100) {
                showResult(resultDiv, 'Please enter a valid percentage between 0 and 100.', 'danger');
                return;
            }

            // Grade calculation logic
            let grade;
            if (percentage >= 80) {
                grade = "A+";
            } else if (percentage >= 70) {
                grade = "A";
            } else if (percentage >= 60) {
                grade = "B";
            } else {
                grade = "Below B";
            }

            // Display result
            showResult(resultDiv, 
                `Percentage: <strong>${percentage}%</strong><br>
                Grade: <strong class="text-success">${grade}</strong>`, 'info');
        }

        // Maximum Number Finder
        function findMaximum() {
            // Get all three input values
            let num1 = parseFloat(document.getElementById('num1').value);
            let num2 = parseFloat(document.getElementById('num2').value);
            let num3 = parseFloat(document.getElementById('num3').value);
            let resultDiv = document.getElementById('maxResult');

            // Input validation
            if (isNaN(num1) || isNaN(num2) || isNaN(num3)) {
                showResult(resultDiv, 'Please enter valid numbers in all three fields.', 'danger');
                return;
            }

            // Maximum number logic
            let maximum;
            if (num1 >= num2 && num1 >= num3) {
                maximum = num1;
            } else if (num2 >= num1 && num2 >= num3) {
                maximum = num2;
            } else {
                maximum = num3;
            }

            // Display result
            showResult(resultDiv, 
                `Numbers: <strong>${num1}, ${num2}, ${num3}</strong><br>
                Maximum Number: <strong class="text-primary">${maximum}</strong>`, 'success');
        }
        
        // Utility function to display results
        function showResult(element, message, type) {
            const typeClass = {
                'success': 'border-success',
                'danger': 'border-danger', 
                'warning': 'border-warning',
                'info': 'border-info'
            };
            
            element.innerHTML = message;
            element.className = `result-box ${typeClass[type] || 'border-primary'}`;
            element.style.display = 'block';
        }
    </script>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
