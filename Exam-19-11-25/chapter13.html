<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
    <script src="myscript.js"></script>
</head>
<body>
    <table class="table">
        <thead id="th"></thead>
        <tbody id="tb"></tbody>
    </table>
    <script>
        let x = fetch("https://jsonplaceholder.typicode.com/todos/1");
    x.then(a =>
        a.json()).then(d => {
            console.log(d);

            let al="<tr>";
            for(let key of Object.keys(d)) {
                al+=`<th>${key}</th>`;
            }
            al+="</tr>";

            let all="<tr>";
            for(let key of Object.keys(d)) {
                all+=`<td>${d[key]}</td>`;
            }
            all+="</tr>";
           document.getElementById("th").innerHTML=al;
            document.getElementById("tb").innerHTML=all;
        });

         

    </script>
    <div>Fetch the following api values</div>
    <ul></ul>
    <li>https://api.open-meteo.com/v1/forecast?latitude=51.5&longitude=-0.1&_weather=true</li>
    <li>https://api.genderize.io/?name=luc</li>
    <li>https://api.agify.io/?name=meelad</li>
    <li>https://api.nationalize.io/?name=nathaniel</li>
    <li>https://dog.ceo/api/breeds/image/random</li>
</body>
</html>
