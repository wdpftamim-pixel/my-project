<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — Mini Web App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="center-box mt-5">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Sign In</h4>
        <div>
          <button class="btn btn-sm btn-outline-secondary" id="darkToggle" onclick="toggleDarkMode()">
            Toggle Theme
          </button>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input id="t1" class="form-control" placeholder="username (e.g. karim)" />
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input id="t2" type="password" class="form-control" placeholder="password" />
      </div>

      <div class="mb-3 form-check d-flex justify-content-between">
        <div>
          <input type="checkbox" class="form-check-input" id="remember">
          <label class="form-check-label" for="remember">Remember me</label>
        </div>
        <div>
          <a href="register.html">Create account</a>
        </div>
      </div>

      <div id="error" class="text-danger mb-2"></div>

      <div class="d-grid gap-2">
        <button class="btn btn-primary" onclick="loginUser()">Login</button>
        <a class="btn btn-outline-secondary" href="validation.html">Try Form Validation Page</a>
      </div>
    </div>
  </div>

  <!-- Bootstrap & scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
