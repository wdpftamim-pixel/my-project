<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register — Mini Web App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="center-box">
      <h4 class="mb-3">Create an account</h4>

      <div class="mb-2">
        <label class="form-label">Full name</label>
        <input id="r_user" class="form-control" placeholder="Your name" />
      </div>

      <div class="mb-2">
        <label class="form-label">Email</label>
        <input id="r_email" class="form-control" placeholder="email@example.com" />
      </div>

      <div class="mb-2">
        <label class="form-label">Password</label>
        <input id="r_pass" type="password" class="form-control" placeholder="min 6 chars" />
      </div>

      <div class="mb-2">
        <label class="form-label" for="r_cpass">Confirm Password</label>
        <input id="r_cpass" type="password" class="form-control" />
      </div>

      <div id="reg_error" class="text-danger mb-2"></div>

      <div class="d-grid gap-2">
        <button class="btn btn-success" onclick="registerUser()">Register</button>
        <a class="btn btn-outline-secondary" href="index.html">Back to Login</a>
      </div>
    </div>
  </div>

  <!-- Bootstrap & scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
