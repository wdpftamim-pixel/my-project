<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script>
        function abc(){
            let p=document.getElementById("t2").value;
            if(p.length<6){
                document.getElementById("error").innerHTML="password must be at least 6 charaters"; 
                return;
            }
            if(document.getElementById("t1").value=="karim" && document.getElementById("t2").value=="123456789"  ){
            window.location="";
            }
            else{
                document.getElementById("error").innerHTML="Invalid username or password";
            }

    }
            </script>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-sm-3"><label for="t1">UserName</label></div>
            <div class="col-sm-9"><input type="text" id="t1" class="form-control"></div>            
        </div>
        <div class="row">
            <div class="col-sm-3"><label for="t2">Password</label></div>
            <div class="col-sm-9"><input type="password" id="t2" class="form-control"></div>            
        </div>
        <div id="error" class="btn-warning"></div>
        <div class="row">
            <button type="button" onclick="abc()" class="btn btn-default btn-success">Login</button>
        </div>
        </div>
</body>
